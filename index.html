<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hangman — DevMode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <span class="theme-icon sun">☀</span>
    <span class="theme-icon moon">☽</span>
  </button>

  <!-- Background orbs -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <div class="modal-emoji" id="modal-emoji">🏆</div>
      <h2 class="modal-title" id="modal-title">You Won!</h2>
      <p class="modal-sub" id="modal-sub">You guessed the word:</p>
      <div class="modal-word" id="modal-word">JAVASCRIPT</div>
      <button class="play-again-btn" id="play-again">Play Again</button>
    </div>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="game-wrapper">

    <!-- LEFT PANEL -->
    <div class="left-panel">
      <div class="game-header">
        <div>
          <div class="game-title">Hangman</div>
          <div class="game-subtitle">// DEV EDITION</div>
        </div>
        <div class="score-badge" id="score-badge">
          <span class="score-label">Score</span>
          <span class="score-value" id="score-value">0</span>
        </div>
      </div>

      <div class="gallows-card">
        <div class="gallows-inner">
          <svg class="gallows-svg" viewBox="0 0 200 230" xmlns="http://www.w3.org/2000/svg">
            <!-- Structure -->
            <line x1="20" y1="218" x2="180" y2="218" class="structure-line" stroke-width="3" stroke-linecap="round"/>
            <line x1="60" y1="218" x2="60" y2="18"  class="structure-line" stroke-width="3" stroke-linecap="round"/>
            <line x1="60" y1="18"  x2="135" y2="18"  class="structure-line" stroke-width="3" stroke-linecap="round"/>
            <line x1="135" y1="18"  x2="135" y2="44"  class="structure-line" stroke-width="3" stroke-linecap="round"/>
            <!-- Brace -->
            <line x1="60" y1="55" x2="95" y2="18"  class="structure-line" stroke-width="2" stroke-linecap="round"/>

            <!-- Body parts (hidden by default) -->
            <circle id="h-head" cx="135" cy="61" r="17" class="body-part" fill="none" stroke-width="2.5"/>
            <line   id="h-body" x1="135" y1="78"  x2="135" y2="130" class="body-part" stroke-width="2.5" stroke-linecap="round"/>
            <line   id="h-larm" x1="135" y1="94"  x2="112" y2="118" class="body-part" stroke-width="2.5" stroke-linecap="round"/>
            <line   id="h-rarm" x1="135" y1="94"  x2="158" y2="118" class="body-part" stroke-width="2.5" stroke-linecap="round"/>
            <line   id="h-lleg" x1="135" y1="130" x2="112" y2="162" class="body-part" stroke-width="2.5" stroke-linecap="round"/>
            <line   id="h-rleg" x1="135" y1="130" x2="158" y2="162" class="body-part" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Wrong guesses</div>
          <div class="stat-value" id="wrong-count">0 / 6</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Lives</div>
          <div class="lives-bar" id="lives-bar">
            <div class="life-pip"></div>
            <div class="life-pip"></div>
            <div class="life-pip"></div>
            <div class="life-pip"></div>
            <div class="life-pip"></div>
            <div class="life-pip"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

      <div class="hint-card">
        <div class="hint-tag">— Hint —</div>
        <div class="hint-text" id="hint-text">Loading...</div>
      </div>

      <div class="word-area">
        <ul class="word-display" id="word-display"></ul>
      </div>

      <div class="keyboard-section">
        <div class="keyboard-label">— Select a letter —</div>
        <div class="keyboard" id="keyboard"></div>
      </div>

    </div>
  </div>

  <footer>
    <p>&copy; 2026 &mdash; Yassine ELKEFI</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
